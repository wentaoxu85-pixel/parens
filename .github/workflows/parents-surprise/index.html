<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>给爸爸妈妈的新年惊喜</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red-deep: #b71c1c;
      --red: #d32f2f;
      --red-light: #ff6659;
      --gold: #ffd700;
      --gold-dim: #c9a227;
      --paper: #fff8e7;
      --ink: #1a1a1a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "SimSun", serif;
      color: var(--paper);
      background: radial-gradient(ellipse 120% 80% at 50% 0%, #8b0000 0%, #3d0505 45%, #1a0202 100%);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    .bg-pattern {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.08;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 30h60M30 0v60' stroke='%23ffd700' stroke-width='0.5'/%3E%3C/svg%3E");
      z-index: 0;
    }

    .lanterns {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 120px;
      pointer-events: none;
      z-index: 1;
    }

    .lantern {
      position: absolute;
      width: 36px;
      height: 48px;
      background: linear-gradient(180deg, var(--red) 0%, #7f0000 100%);
      border-radius: 50% 50% 45% 45%;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.35);
      animation: swing 3.5s ease-in-out infinite;
    }

    .lantern::before {
      content: "";
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 8px;
      background: var(--gold);
      border-radius: 2px;
    }

    .lantern::after {
      content: "";
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 22px;
      background: linear-gradient(var(--gold), transparent);
    }

    .lantern:nth-child(1) { left: 8%; animation-delay: 0s; }
    .lantern:nth-child(2) { left: 22%; animation-delay: 0.4s; transform-origin: top center; }
    .lantern:nth-child(3) { right: 22%; left: auto; animation-delay: 0.8s; }
    .lantern:nth-child(4) { right: 8%; left: auto; animation-delay: 1.2s; }

    @keyframes swing {
      0%, 100% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
    }

    .hongbao-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .hongbao {
      position: absolute;
      width: 28px;
      height: 38px;
      background: linear-gradient(135deg, var(--red-light), var(--red));
      border-radius: 4px;
      border: 2px solid var(--gold);
      opacity: 0.85;
      animation: fall linear infinite;
    }

    .hongbao::after {
      content: "福";
      font-family: "Ma Shan Zheng", "Noto Serif SC", cursive;
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: var(--gold);
      font-weight: 400;
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.85; }
      90% { opacity: 0.85; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    main {
      position: relative;
      z-index: 3;
      max-width: 720px;
      margin: 0 auto;
      padding: 100px 20px 48px;
      text-align: center;
    }

    h1 {
      font-family: "Ma Shan Zheng", "Noto Serif SC", cursive;
      font-size: clamp(2.35rem, 8vw, 3.35rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      line-height: 1.2;
      margin-bottom: 0.3em;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.25);
    }

    .subtitle {
      font-family: "ZCOOL XiaoWei", "Noto Serif SC", serif;
      font-size: clamp(1.15rem, 3.5vw, 1.45rem);
      color: var(--gold);
      margin-bottom: 2rem;
      font-weight: 400;
      letter-spacing: 0.28em;
    }

    .blessings {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px 20px;
      margin-bottom: 2rem;
    }

    .blessings span {
      font-family: "ZCOOL XiaoWei", "Noto Serif SC", serif;
      padding: 8px 16px;
      border: 1px solid var(--gold-dim);
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.25);
      font-size: 1.15rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: var(--gold);
    }

    .photo-frame {
      position: relative;
      margin: 0 auto 2rem;
      max-width: 520px;
      padding: 14px;
      background: linear-gradient(145deg, var(--gold) 0%, var(--gold-dim) 40%, var(--gold) 100%);
      border-radius: 6px;
      box-shadow:
        0 0 0 4px var(--red-deep),
        0 24px 60px rgba(0, 0, 0, 0.55),
        inset 0 0 0 2px rgba(255, 255, 255, 0.25);
    }

    .photo-frame::before {
      content: "";
      position: absolute;
      inset: 8px;
      border: 2px dashed rgba(139, 0, 0, 0.35);
      border-radius: 4px;
      pointer-events: none;
    }

    .photo-frame img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 4px;
      vertical-align: middle;
      min-height: 200px;
      object-fit: cover;
      object-position: center top;
      background: #2a0505;
    }

    .letter {
      text-align: left;
      line-height: 2;
      font-size: 1.08rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: rgba(255, 248, 231, 0.95);
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255, 215, 0, 0.35);
      border-radius: 8px;
      padding: 1.5rem 1.35rem;
      margin-bottom: 2rem;
    }

    .letter p + p:not(.sign) {
      margin-top: 1em;
      text-indent: 2em;
    }

    .letter p.sign {
      margin-top: 1.25rem;
    }

    .sign {
      font-family: "ZCOOL XiaoWei", "Noto Serif SC", serif;
      text-align: right;
      color: var(--gold);
      font-size: 1.12rem;
      letter-spacing: 0.2em;
      text-indent: 0;
    }

    .toolbar {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 215, 0, 0.2);
    }

    .toolbar label {
      font-family: "ZCOOL XiaoWei", "Noto Serif SC", serif;
      display: inline-block;
      cursor: pointer;
      padding: 10px 20px;
      background: linear-gradient(180deg, var(--red) 0%, var(--red-deep) 100%);
      border: 1px solid var(--gold-dim);
      border-radius: 6px;
      color: var(--paper);
      font-size: 1.05rem;
      letter-spacing: 0.12em;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .toolbar label:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255, 215, 0, 0.2);
    }

    .toolbar input[type="file"] {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
    }

    .hint {
      margin-top: 10px;
      font-size: 0.85rem;
      color: rgba(255, 248, 231, 0.55);
    }

    footer {
      font-family: "Noto Serif SC", serif;
      font-size: 0.88rem;
      letter-spacing: 0.12em;
      color: rgba(255, 215, 0, 0.5);
    }
  </style>
</head>
<body>
  <div class="bg-pattern" aria-hidden="true"></div>
  <div class="lanterns" aria-hidden="true">
    <div class="lantern"></div>
    <div class="lantern"></div>
    <div class="lantern"></div>
    <div class="lantern"></div>
  </div>
  <div class="hongbao-layer" id="hongbaoLayer" aria-hidden="true"></div>

  <main>
    <h1>亲爱的爸爸妈妈</h1>
    <p class="subtitle">新春快乐 · 平安健康</p>

    <div class="blessings" role="list">
      <span role="listitem">大吉大利</span>
      <span role="listitem">福</span>
      <span role="listitem">万事如意</span>
      <span role="listitem">好运连连</span>
    </div>

    <figure class="photo-frame">
      <img
        id="familyPhoto"
        alt="全家福"
        width="520"
        height="650"
      />
    </figure>

    <section class="letter" aria-label="给爸妈的信">
      <p>这一年你们辛苦了。谢谢你们一直把我放在心上，用半生的力气撑起一个家。</p>
      <p>愿新的一年里，你们少操心、多休息，身体硬朗，心情像今天的红布景一样热热闹闹、喜气洋洋。</p>
      <p>我爱你们。新年快乐。</p>
      <p class="sign">—— 孩子 敬上</p>
    </section>

    <div class="toolbar">
      <label for="photoInput">放入这张照片</label>
      <input id="photoInput" type="file" accept="image/*" />
      <p class="hint">在电脑上选好您聊天里的那张照片即可；把本页和 <code style="color: var(--gold);">parents-photo.jpg</code> 放在同一文件夹并同名打开，也可自动显示。</p>
    </div>

    <footer>用心做的一页小惊喜 · 仅供家人私藏</footer>
  </main>

  <script>
    (function () {
      var img = document.getElementById("familyPhoto");
      var input = document.getElementById("photoInput");
      var layer = document.getElementById("hongbaoLayer");

      function tryDefaultPhoto() {
        img.src = "parents-photo.jpg";
        img.onerror = function () {
          img.removeAttribute("src");
          img.alt = "请点击下方按钮，选择您要展示的全家福照片";
        };
      }

      tryDefaultPhoto();

      input.addEventListener("change", function () {
        var file = input.files && input.files[0];
        if (!file) return;
        var url = URL.createObjectURL(file);
        img.onload = function () {
          URL.revokeObjectURL(url);
        };
        img.src = url;
        img.alt = "全家福";
      });

      for (var i = 0; i < 18; i++) {
        var el = document.createElement("div");
        el.className = "hongbao";
        el.style.left = Math.random() * 100 + "%";
        el.style.animationDuration = 8 + Math.random() * 10 + "s";
        el.style.animationDelay = Math.random() * 8 + "s";
        layer.appendChild(el);
      }
    })();
  </script>
</body>
</html>
